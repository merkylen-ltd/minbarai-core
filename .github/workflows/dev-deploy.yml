name: Deploy Dev Branch

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

env:
  PROJECT_ID: gen-lang-client-0842740671
  REGION: europe-west1
  SERVICE_NAME: minbarai-dev
  SERVICE_ACCOUNT: minberai-service-account@gen-lang-client-0842740671.iam.gserviceaccount.com

jobs:
  dev-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Build application
        env:
          CI: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://ci-stub.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-stub-anon-key' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || 'pk_test_ci_stub' }}
          NEXT_PUBLIC_STRIPE_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID || 'price_ci_stub' }}
          NEXT_PUBLIC_VOICEFLOW_WS_URL: ${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL || 'wss://ci-stub.voiceflow.com' }}
          NEXT_PUBLIC_VOICEFLOW_WS_TOKEN: ${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_TOKEN || 'ci-stub-ws-token' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://ci-stub.minbarai.com' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'https://ci-stub.minbarai.com' }}
        run: npm run build

      - name: Authenticate to Google Cloud
        # Only deploy on direct pushes, not on PRs (no GCP credentials on forks)
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        if: github.event_name == 'push'
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        if: github.event_name == 'push'
        run: |
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_STRIPE_PRICE_ID="${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID }}" \
            --build-arg NEXT_PUBLIC_VOICEFLOW_WS_URL="${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL }}" \
            --build-arg NEXT_PUBLIC_VOICEFLOW_WS_TOKEN="${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_TOKEN }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run (dev)
        if: github.event_name == 'push'
        run: |
          DEV_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://minbarai-dev-e5l6mfznxq-ew.a.run.app' }}"
          ENV_FILE=$(mktemp /tmp/cloud-run-env-XXXXXX.yaml)
          cat > "$ENV_FILE" << ENVEOF
          NODE_ENV: "development"
          NEXT_PUBLIC_SITE_URL: "${DEV_SITE_URL}"
          NEXTAUTH_URL: "${DEV_SITE_URL}"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
          NEXT_PUBLIC_STRIPE_PRICE_ID: "${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID }}"
          NEXT_PUBLIC_VOICEFLOW_WS_URL: "${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL }}"
          NEXT_PUBLIC_VOICEFLOW_WS_URL_PROD: "${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL_PROD }}"
          NEXT_PUBLIC_VOICEFLOW_WS_TOKEN: "${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_TOKEN }}"
          ADMIN_EMAILS: "${{ secrets.ADMIN_EMAILS }}"
          RESEND_API_KEY: "${{ secrets.RESEND_API_KEY }}"
          RESEND_FROM_EMAIL: "${{ secrets.RESEND_FROM_EMAIL }}"
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
          CRON_SECRET: "${{ secrets.CRON_SECRET }}"
          ENVEOF

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 100 \
            --timeout 300 \
            --env-vars-file "$ENV_FILE" \
            --set-secrets STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest \
            --set-secrets STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest \
            --set-secrets SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --quiet

          rm -f "$ENV_FILE"

      - name: Dev deployment status
        run: echo "Dev branch build and deploy complete (minbarai-dev)"
