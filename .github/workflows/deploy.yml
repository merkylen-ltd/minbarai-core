name: Deploy (manual fallback)

# Manual emergency deploy to Cloud Run production.
# Normal deployments are handled automatically by Google Cloud Build
# via the GCP GitHub integration (cloudbuild.yaml).

on:
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0842740671
  REGION: europe-west1
  SERVICE_NAME: minbarai-pro
  SERVICE_ACCOUNT: minberai-service-account@gen-lang-client-0842740671.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_STRIPE_PRICE_ID="${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID }}" \
            --build-arg NEXT_PUBLIC_VOICEFLOW_WS_URL="${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL }}" \
            --build-arg NEXT_PUBLIC_VOICEFLOW_WS_TOKEN="${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_TOKEN }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            -t gcr.io/${{ env.PROJECT_ID }}/minbarai:${{ github.sha }} \
            -t gcr.io/${{ env.PROJECT_ID }}/minbarai:latest .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/minbarai:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/minbarai:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/minbarai:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 50 \
            --concurrency 100 \
            --timeout 300 \
            --update-env-vars "^|^NODE_ENV=production|NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}|NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}|NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}|NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}|NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}|NEXT_PUBLIC_STRIPE_PRICE_ID=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID }}|NEXT_PUBLIC_VOICEFLOW_WS_URL=${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_URL }}|NEXT_PUBLIC_VOICEFLOW_WS_TOKEN=${{ secrets.NEXT_PUBLIC_VOICEFLOW_WS_TOKEN }}|ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}|RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}|CRON_SECRET=${{ secrets.CRON_SECRET }}" \
            --set-secrets "STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --set-secrets "STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest" \
            --set-secrets "RESEND_API_KEY=RESEND_API_KEY:latest" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --quiet
