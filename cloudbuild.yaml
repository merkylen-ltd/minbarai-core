# Google Cloud Build CI/CD Pipeline for MinbarAI
# Full pipeline: lint, test, security, build, deploy
# Branch-based deployment: dev → minbarai-dev, main → minbarai-pro

steps:
  # Step 1: Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--no-audit', '--no-fund']
    id: 'install-deps'

  # Step 2: Lint check
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'lint']
    id: 'lint'
    waitFor: ['install-deps']

  # Step 3: Type check
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'type-check']
    id: 'type-check'
    waitFor: ['install-deps']

  # Step 4: Run tests
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'test', '--', '--watchAll=false']
    env:
      - 'CI=true'
    id: 'test'
    waitFor: ['install-deps']

  # Step 5: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--no-cache',
      '-t', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}',
      '--build-arg', 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}',
      '--build-arg', 'NEXT_PUBLIC_STRIPE_PRICE_ID=${_NEXT_PUBLIC_STRIPE_PRICE_ID}',
      '--build-arg', 'NEXT_PUBLIC_VOICEFLOW_WS_URL=${_NEXT_PUBLIC_VOICEFLOW_WS_URL}',
      '--build-arg', 'NEXT_PUBLIC_VOICEFLOW_WS_TOKEN=${_NEXT_PUBLIC_VOICEFLOW_WS_TOKEN}',
      '--build-arg', 'NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}',
      '--build-arg', 'NEXTAUTH_URL=${_NEXTAUTH_URL}',
      '.'
    ]
    id: 'docker-build'
    waitFor: ['lint', 'type-check', 'test']

  # Step 6: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA']
    id: 'push-sha'
    waitFor: ['docker-build']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest']
    id: 'push-latest'
    waitFor: ['push-sha']

  # Step 7: Deploy to Cloud Run
  # Uses --update-env-vars (additive) so existing service env vars are preserved.
  # ADMIN_EMAILS may contain commas — use ^|^ as the key=value list delimiter.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          SERVICE="${_SERVICE_NAME_PROD}"
          MEMORY="2Gi"
          CPU="2"
          MIN_INST="1"
          MAX_INST="50"
          NODE_ENV_VAL="production"
        else
          SERVICE="${_SERVICE_NAME_DEV}"
          MEMORY="1Gi"
          CPU="1"
          MIN_INST="0"
          MAX_INST="10"
          NODE_ENV_VAL="development"
        fi

        gcloud run deploy "$SERVICE" \
          --image "gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA" \
          --platform managed \
          --region "${_REGION}" \
          --allow-unauthenticated \
          --port 8080 \
          --memory "$MEMORY" \
          --cpu "$CPU" \
          --min-instances "$MIN_INST" \
          --max-instances "$MAX_INST" \
          --concurrency 100 \
          --timeout 300 \
          --update-env-vars "^|^NODE_ENV=${NODE_ENV_VAL}|NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}|NEXTAUTH_URL=${_NEXTAUTH_URL}|NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}|NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}|NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}|NEXT_PUBLIC_STRIPE_PRICE_ID=${_NEXT_PUBLIC_STRIPE_PRICE_ID}|NEXT_PUBLIC_VOICEFLOW_WS_URL=${_NEXT_PUBLIC_VOICEFLOW_WS_URL}|NEXT_PUBLIC_VOICEFLOW_WS_TOKEN=${_NEXT_PUBLIC_VOICEFLOW_WS_TOKEN}|ADMIN_EMAILS=${_ADMIN_EMAILS}|RESEND_FROM_EMAIL=${_RESEND_FROM_EMAIL}|CRON_SECRET=${_CRON_SECRET}" \
          --set-secrets "STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
          --set-secrets "STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
          --set-secrets "SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest" \
          --set-secrets "RESEND_API_KEY=RESEND_API_KEY:latest" \
          --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" \
          --service-account "minberai-service-account@$PROJECT_ID.iam.gserviceaccount.com" \
          --quiet
    id: 'deploy'
    waitFor: ['push-latest']

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

# Substitution defaults — override these in the Cloud Build trigger settings (GCP Console)
substitutions:
  _REGION: 'europe-west1'
  _IMAGE_NAME: 'minbarai'
  _SERVICE_NAME_PROD: 'minbarai-pro'
  _SERVICE_NAME_DEV: 'minbarai-dev'
  _NEXT_PUBLIC_SITE_URL: 'https://minbarai.com'
  _NEXTAUTH_URL: 'https://minbarai.com'
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ''
  _NEXT_PUBLIC_STRIPE_PRICE_ID: ''
  _NEXT_PUBLIC_VOICEFLOW_WS_URL: ''
  _NEXT_PUBLIC_VOICEFLOW_WS_TOKEN: ''
  _ADMIN_EMAILS: ''
  _RESEND_FROM_EMAIL: ''
  _CRON_SECRET: ''
